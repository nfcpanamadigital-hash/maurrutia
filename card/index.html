<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Miguel Ángel Urrutia – Digital Card</title>
  <style>
    :root {
      --black:      #050505;
      --black-soft: #111111;
      --gold:       #d4af37;
      --gold-light: #f5d978;
      --gold-dark:  #8a6f1d;
      --text-muted: #c9b56a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px 16px;
      background:
        radial-gradient(circle at top, rgba(212,175,55,0.18), transparent 32%),
        linear-gradient(160deg, #000000, #111111 52%, #050505);
      font-family: "Cormorant Garamond", "Playfair Display", Georgia, "Times New Roman", serif;
      color: var(--gold);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Card shell ──────────────────────────────────────────── */
    .card {
      width: 100%;
      max-width: 360px;
      padding: 32px 22px 24px;
      border-radius: 24px;
      text-align: center;
      background: linear-gradient(180deg, #131313, #050505);
      border: 1px solid rgba(212,175,55,0.48);
      box-shadow:
        0 25px 70px rgba(0,0,0,0.72),
        0 0 34px rgba(212,175,55,0.10);
    }

    /* ── Profile photo ───────────────────────────────────────── */
    .profile-photo {
      width: 160px;
      height: 160px;
      object-fit: cover;
      object-position: center top;
      display: block;
      margin: 0 auto 20px;
      border-radius: 50%;
      border: 3px solid var(--gold);
      box-shadow:
        0 0 0 6px rgba(212,175,55,0.12),
        0 16px 30px rgba(0,0,0,0.5);
      background: #000;
    }

    /* ── Name & subtitle ─────────────────────────────────────── */
    h1 {
      font-size: 28px;
      line-height: 1.15;
      font-weight: 700;
      letter-spacing: 0.6px;
      color: var(--gold-light);
      text-shadow: 0 2px 12px rgba(212,175,55,0.22);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 13px;
      line-height: 1.45;
      color: var(--text-muted);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin-bottom: 24px;
      padding: 0 4px;
    }

    /* ── Buttons ─────────────────────────────────────────────── */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 11px;
      width: 88%;
      min-height: 52px;
      margin: 9px auto;
      padding: 13px 16px;
      border-radius: 999px;
      text-decoration: none;
      font-family: "Cormorant Garamond", "Playfair Display", Georgia, "Times New Roman", serif;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 0.4px;
      transition: transform 0.14s ease, box-shadow 0.14s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:hover,
    .btn:focus-visible {
      transform: translateY(-1px);
      box-shadow: 0 8px 22px rgba(212,175,55,0.18);
      outline: none;
    }
    .btn:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

    .btn img {
      height: 20px;
      width: auto;
      flex-shrink: 0;
    }

    /* Dark gold-border style — Save, Call, Email, LinkedIn */
    .btn-dark {
      background: #080808;
      color: var(--gold-light);
      border: 1px solid rgba(212,175,55,0.70);
    }

    /* WhatsApp green */
    .btn-whatsapp {
      background: linear-gradient(135deg, #075e54, #128c7e);
      color: #fff7d6;
      border: 1px solid rgba(245,217,120,0.65);
    }

    /* Website — text only, subtle gold outline */
    .btn-website {
      background: transparent;
      color: var(--gold-light);
      border: 1px solid rgba(212,175,55,0.40);
      font-size: 14px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 500;
    }

    /* ── Footer ──────────────────────────────────────────────── */
    .footer {
      margin-top: 20px;
      font-size: 11.5px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: rgba(212,175,55,0.55);
    }

    .footer a {
      color: rgba(245,217,120,0.70);
      text-decoration: none;
      font-weight: 600;
    }
    .footer a:hover { color: var(--gold-light); }
  </style>
</head>

<body>
  <div class="card">

    <!-- Profile photo — source set by inline script below -->
    <img
      id="profilePhoto"
      src="../MAU.png"
      alt="Miguel Ángel Urrutia — Conference Interpreter, Panama City"
      class="profile-photo"
    />

    <h1>Miguel Ángel Urrutia</h1>
    <p class="subtitle">Conference Interpreter &amp; Certified Court Interpreter</p>

    <!-- Save Contact -->
    <a class="btn btn-dark" href="../Maurrutia.vcf" download>
      <img src="../assets/user_icon.png" alt="" />
      Save Contact
    </a>

    <!-- Call -->
    <a class="btn btn-dark" href="tel:+50766541664">
      <img src="../assets/call_icon.jpg" alt="" />
      Call
    </a>

    <!-- WhatsApp -->
    <a class="btn btn-whatsapp" href="https://wa.me/50766541664" target="_blank" rel="noopener noreferrer">
      <img src="../assets/whatsapp_icon.png" alt="" />
      WhatsApp
    </a>

    <!-- Email -->
    <a class="btn btn-dark" href="mailto:mau@maurrutia.com">
      <img src="../assets/email_icon_white.png" alt="" />
      Email
    </a>

    <!-- LinkedIn -->
    <a class="btn btn-dark" href="https://www.linkedin.com/in/miguel-%C3%A1ngel-urrutia-6468b936" target="_blank" rel="noopener noreferrer">
      <img src="../assets/Linkedin_logo.png" alt="" />
      LinkedIn
    </a>

    <!-- Website — text only, no external icon -->
    <a class="btn btn-website" href="https://maurrutia.com" target="_blank" rel="noopener noreferrer">
      maurrutia.com
    </a>

    <!-- Footer -->
    <div class="footer">
      <a href="https://wa.me/50767317853" target="_blank" rel="noopener noreferrer">Powered by Digital Cards Panama</a>
    </div>

  </div>

  <script>
    /* Rotate among three local photos — no external requests */
    var photos = ["../MAU.png", "../MAU2.png", "../MAU3.png"];
    document.getElementById("profilePhoto").src = photos[Math.floor(Math.random() * photos.length)];
  </script>
</body>
</html>
